<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pandagamers.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pandamonium Gaming Community</title>
    <script>
      // GitHub Pages SPA routing workaround
      // Convert pathname to hash-based routing
      const path = window.location.pathname;
      const basePath = '/pandagamers.io';
      
      // Extract the route from the pathname
      if (path !== basePath + '/' && path !== basePath && path.startsWith(basePath)) {
        const route = path.slice(basePath.length);
        // Redirect to the same path but with hash-based routing
        window.location.replace(basePath + '/#' + route);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/pandagamers.io/assets/index.js"></script>
  </body>
</html>
