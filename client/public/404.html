<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pandagamers.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pandamonium Gaming Community</title>
    <script>
      // GitHub Pages SPA routing workaround
      // When a 404 occurs, redirect to index.html with the original path preserved
      const redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/pandagamers.io/assets/index.js"></script>
  </body>
</html>
