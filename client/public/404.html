<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pandagamers.io/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pandamonium Gaming Community</title>
    <script>
      // GitHub Pages SPA routing workaround
      // Store the current path before redirecting to index.html
      const path = window.location.pathname;
      const base = '/pandagamers.io';
      
      // Only redirect if this is not the root path
      if (path !== base + '/' && path !== base) {
        // Store the path for the app to use
        sessionStorage.redirect = path;
        // Redirect to the base index.html
        window.location.href = base + '/';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/pandagamers.io/assets/index.js"></script>
  </body>
</html>
